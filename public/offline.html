<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Pebbly</title>
  <style>
    :root {
      --background: oklch(0.145 0 0);
      --foreground: oklch(0.985 0 0);
      --muted: oklch(0.708 0 0);
      --secondary: oklch(0.269 0 0);
      --secondary-foreground: oklch(0.985 0 0);
      --border: oklch(1 0 0 / 10%);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--background);
      color: var(--foreground);
      min-height: 100vh;
      display: grid;
      place-content: center;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    .error-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      max-width: 28rem;
      animation: fadeIn 0.4s ease-out;
    }

    .icon-wrapper {
      display: flex;
      width: 4rem;
      height: 4rem;
      align-items: center;
      justify-content: center;
      border-radius: 1rem;
      background-color: oklch(0.269 0 0 / 40%);
      color: var(--foreground);
      margin-bottom: 1.5rem;
    }

    .icon-wrapper svg {
      width: 1.75rem;
      height: 1.75rem;
    }

    h3 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      letter-spacing: -0.025em;
    }

    p {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.625;
      margin-bottom: 1.5rem;
    }

    .button-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 2.25rem;
      padding: 0 1rem;
      font-weight: 500;
      font-size: 0.875rem;
      border-radius: 0.75rem;
      cursor: pointer;
      transition: background-color 0.15s ease;
      outline: none;
      border: none;
      text-decoration: none;
    }

    .btn-outline {
      background-color: transparent;
      border: 1px solid var(--border);
      color: var(--foreground);
    }

    .btn-outline:hover {
      background-color: oklch(1 0 0 / 5%);
    }

    .btn-secondary {
      background-color: var(--secondary);
      color: var(--secondary-foreground);
    }

    .btn-secondary:hover {
      background-color: oklch(0.269 0 0 / 85%);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="icon-wrapper">
      <!-- Wifi Off SVG -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.5" />
        <path d="M5 12.5a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" stroke-width="2.5" />
      </svg>
    </div>
    <div>
      <h3>Connection Lost</h3>
      <p>You're currently offline. Please check your internet connection and try reloading.</p>
    </div>
    <div class="button-group">
      <button class="btn btn-outline" onclick="window.location.reload()">Try again</button>
      <a href="/" class="btn btn-secondary">Back to home</a>
    </div>
  </div>
</body>
</html>
